name: frontend-build

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-build.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
